<body>
    <!-- Header -->
    <header class="bg-primary text-white py-3">
        <div class="container text-center">
            <img src="https://via.placeholder.com/150x50?text=Logo+Lego'llection" alt="Logo Lego'llection" class="img-fluid">
        </div>
    </header>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Lego'llection</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="search.html">Recherche</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="collectionDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Collection
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="collectionDropdown">
                            <li><a class="dropdown-item" id="myCollectionLink" href="collection.html?view=mine">Ma Collection</a></li>
                            <li><a class="dropdown-item" id="myBorrowsLink" href="collection.html?view=borrows">Mes emprunts</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="addDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Ajouter
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="addDropdown">
                            <li><a class="dropdown-item" href="add_site.html">Site</a></li>
                            <li><a class="dropdown-item" href="add_local.html">Local</a></li>
                            <li><a class="dropdown-item" href="add_rangement.html">Rangement</a></li>
                            <li><a class="dropdown-item" href="add_niveau.html">Niveau</a></li>
                            <li><a class="dropdown-item" href="add_set.html">Set</a></li>
                            <li><a class="dropdown-item" href="add_collection.html">Collection</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex ms-auto">
                    <div id="profileMenuContainer" class="d-flex align-items-center">
                        <a href="login.html">
                            <img src="./assets/ProfilParDefaut.png" class="rounded-circle" alt="Photo de profil" width="40" height="40">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <h1 class="mb-4">Rechercher des Sets</h1>

        <!-- Search Form -->
        <div class="search-container">
            <form id="searchForm" class="search-form">
                <div class="row g-3">
                    <!-- Nom du Set -->
                    <div class="col-md-6">
                        <label for="nameSearch" class="form-label">Nom du Set</label>
                        <input type="text" class="form-control" id="nameSearch" placeholder="Contient...">
                    </div>

                    <!-- Site -->
                    <div class="col-md-6">
                        <label for="siteSelect" class="form-label">Site</label>
                        <select class="form-select" id="siteSelect">
                            <option value="">-- Tous les sites --</option>
                        </select>
                    </div>

                    <!-- Local -->
                    <div class="col-md-6">
                        <label for="localSelect" class="form-label">Local</label>
                        <select class="form-select" id="localSelect">
                            <option value="">-- Tous les locaux --</option>
                        </select>
                    </div>

                    <!-- Rangement -->
                    <div class="col-md-6">
                        <label for="rangementSelect" class="form-label">Rangement</label>
                        <select class="form-select" id="rangementSelect">
                            <option value="">-- Tous les rangements --</option>
                        </select>
                    </div>

                    <!-- Niveau -->
                    <div class="col-md-6">
                        <label for="niveauSelect" class="form-label">Niveau</label>
                        <select class="form-select" id="niveauSelect">
                            <option value="">-- Tous les niveaux --</option>
                        </select>
                    </div>

                    <!-- Collection/Catégorie -->
                    <div class="col-md-6">
                        <label for="collectionSelect" class="form-label">Collection</label>
                        <select class="form-select" id="collectionSelect">
                            <option value="">-- Toutes les collections --</option>
                        </select>
                    </div>

                    <!-- Propriétaire -->
                    <div class="col-md-6">
                        <label for="ownerSearch" class="form-label">Propriétaire</label>
                        <input type="text" class="form-control" id="ownerSearch" placeholder="Nom ou prénom (partiel)...">
                    </div>

                    <!-- Statut d'emprunt -->
                    <div class="col-md-6">
                        <label for="statusSelect" class="form-label">Statut</label>
                        <select class="form-select" id="statusSelect">
                            <option value="">-- Tous les statuts --</option>
                        </select>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="row g-3 mt-3">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Rechercher
                        </button>
                        <button type="reset" class="btn btn-secondary ms-2">Réinitialiser</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Results Container -->
        <div class="results-container">
            <div id="loadingIndicator" class="loading d-none">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Chargement...</span>
                </div>
            </div>
            <div id="resultsCount" class="mb-3"></div>
            <div id="resultsList"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/permissions.js"></script>
    <script src="./assets/profile_menu.js"></script>
    <script src="./assets/search.js"></script>
    <script>
        // Initialiser les contrôles d'accès et le menu profil au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            checkUserPermissions();
            initializeProfileMenu();
        });
    </script>
</body>
</html>
