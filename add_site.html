<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Site - Lego'llection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-primary text-white py-3">
        <div class="container text-center">
            <img src="https://via.placeholder.com/150x50?text=Logo+Lego'llection" alt="Logo Lego'llection" class="img-fluid">
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Lego'llection</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="search.html">Recherche</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="addDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Ajouter
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="addDropdown">
                            <li><a class="dropdown-item" href="add_site.html">Site</a></li>
                            <li><a class="dropdown-item" href="add_local.html">Local</a></li>
                            <li><a class="dropdown-item" href="add_rangement.html">Rangement</a></li>
                            <li><a class="dropdown-item" href="add_niveau.html">Niveau</a></li>
                            <li><a class="dropdown-item" href="add_set.html">Set</a></li>
                            <li><a class="dropdown-item" href="add_collection.html">Collection</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex ms-auto">
                    <div id="profileMenuContainer" class="d-flex align-items-center">
                        <a href="login.html">
                            <img src="./assets/ProfilParDefaut.png" class="rounded-circle" alt="Photo de profil" width="40" height="40">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Ajouter un Site</h1>
        <div id="message" class="alert" style="display: none;"></div>
        <form id="addSiteForm">
            <div class="mb-3">
                <label for="nom" class="form-label">Nom</label>
                <input type="text" class="form-control" id="nom" name="nom" required>
            </div>
            <div class="mb-3">
                <label for="adresse" class="form-label">Adresse</label>
                <input type="text" class="form-control" id="adresse" name="adresse" required>
            </div>
            <div class="mb-3">
                <label for="codePostal" class="form-label">Code Postal</label>
                <input type="text" class="form-control" id="codePostal" name="codePostal" required>
            </div>
            <div class="mb-3">
                <label for="localite" class="form-label">Localité</label>
                <input type="text" class="form-control" id="localite" name="localite" required>
            </div>
            <div class="mb-3">
                <label for="photo" class="form-label">Photo (URL)</label>
                <input type="text" class="form-control" id="photo" name="photo">
            </div>
            <button type="submit" class="btn btn-primary">Ajouter le Site</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/permissions.js"></script>
    <script src="assets/profile_menu.js"></script>
    <script>
        document.getElementById('addSiteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('api/add_site.php', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            })
            .then(response => response.json())
            .then(data => {
                const messageDiv = document.getElementById('message');
                if (data.success) {
                    messageDiv.className = 'alert alert-success';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                    this.reset();
                } else {
                    messageDiv.className = 'alert alert-danger';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                }
            })
            .catch(error => {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Erreur de connexion.</div>';
            });
        });

        // Vérifier les permissions au démarrage
        checkUserPermissions();

        // Initialiser le menu profil
        initializeProfileMenu();
    </script>
</body>
</html>
