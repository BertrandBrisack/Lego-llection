<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Lego'llection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="assets/icon.png" type="image/png">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center">Créer un compte</h2>
                <div id="message" class="alert" style="display: none;"></div>
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="nom" name="nom" required>
                    </div>
                    <div class="mb-3">
                        <label for="prenom" class="form-label">Prénom</label>
                        <input type="text" class="form-control" id="prenom" name="prenom" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Rôle</label>
                        <select class="form-control" id="role" name="role" required>
                            <option value="">Choisissez un rôle</option>
                            <option value="owner">Owner</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="login" class="form-label">Pseudo</label>
                        <input type="text" class="form-control" id="login" name="login" required>
                    </div>
                    <div class="mb-3">
                        <label for="mdp" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="mdp" name="mdp" required>
                        <div class="form-text mt-2">
                            <strong>Exigences du mot de passe :</strong>
                            <ul class="small mb-0" style="padding-left: 20px; margin-top: 8px;">
                                <li id="req-length" class="text-danger">✗ Au moins 15 caractères</li>
                                <li id="req-uppercase" class="text-danger">✗ Au moins une majuscule</li>
                                <li id="req-lowercase" class="text-danger">✗ Au moins une minuscule</li>
                                <li id="req-digit" class="text-danger">✗ Au moins un chiffre</li>
                                <li id="req-punctuation" class="text-danger">✗ Au moins un caractère de ponctuation (!@#$%^&*...)</li>
                            </ul>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Créer un compte</button>
                </form>
                <div class="text-center mt-3">
                    <a href="login.html" class="btn btn-secondary">Se connecter</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validation du mot de passe en temps réel
        const mdpInput = document.getElementById('mdp');
        
        function validatePasswordCriteria(mdp) {
            const criteria = {
                length: mdp.length >= 15,
                uppercase: /[A-Z]/.test(mdp),
                lowercase: /[a-z]/.test(mdp),
                digit: /[0-9]/.test(mdp),
                punctuation: /[!@#$%^&*()_+\-=\[\]{};:'",.<>?\\\|`~]/.test(mdp)
            };
            return criteria;
        }
        
        function updatePasswordUI(criteria) {
            document.getElementById('req-length').className = criteria.length ? 'text-success' : 'text-danger';
            document.getElementById('req-length').textContent = (criteria.length ? '✓' : '✗') + ' Au moins 15 caractères';
            
            document.getElementById('req-uppercase').className = criteria.uppercase ? 'text-success' : 'text-danger';
            document.getElementById('req-uppercase').textContent = (criteria.uppercase ? '✓' : '✗') + ' Au moins une majuscule';
            
            document.getElementById('req-lowercase').className = criteria.lowercase ? 'text-success' : 'text-danger';
            document.getElementById('req-lowercase').textContent = (criteria.lowercase ? '✓' : '✗') + ' Au moins une minuscule';
            
            document.getElementById('req-digit').className = criteria.digit ? 'text-success' : 'text-danger';
            document.getElementById('req-digit').textContent = (criteria.digit ? '✓' : '✗') + ' Au moins un chiffre';
            
            document.getElementById('req-punctuation').className = criteria.punctuation ? 'text-success' : 'text-danger';
            document.getElementById('req-punctuation').textContent = (criteria.punctuation ? '✓' : '✗') + ' Au moins un caractère de ponctuation (!@#$%^&*...)';
        }
        
        mdpInput.addEventListener('input', function() {
            const criteria = validatePasswordCriteria(this.value);
            updatePasswordUI(criteria);
        });
        
        // Soumission du formulaire
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const mdp = document.getElementById('mdp').value;
            const criteria = validatePasswordCriteria(mdp);
            
            // Vérifier que tous les critères sont respectés
            if (!criteria.length || !criteria.uppercase || !criteria.lowercase || !criteria.digit || !criteria.punctuation) {
                const messageDiv = document.getElementById('message');
                messageDiv.className = 'alert alert-danger';
                messageDiv.textContent = 'Le mot de passe ne respecte pas les exigences de sécurité.';
                messageDiv.style.display = 'block';
                return;
            }
            
            const formData = new FormData(this);
            fetch('backend/api/register.php', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            })
            .then(response => response.json())
            .then(data => {
                const messageDiv = document.getElementById('message');
                if (data.success) {
                    messageDiv.className = 'alert alert-success';
                    messageDiv.innerHTML = data.message;
                    messageDiv.style.display = 'block';
                } else {
                    messageDiv.className = 'alert alert-danger';
                    messageDiv.textContent = data.message;
                    messageDiv.style.display = 'block';
                }
            })
            .catch(error => {
                document.getElementById('message').innerHTML = '<div class="alert alert-danger">Erreur de connexion.</div>';
            });
        });
    </script>
</body>
</html>
